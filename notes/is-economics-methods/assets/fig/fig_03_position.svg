<svg viewBox="0 0 700 320" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Noto Sans SC', sans-serif">
  <text x="120" y="40" text-anchor="middle" font-size="13" fill="#64748b">advertisers (value per click)</text>
  <g font-size="13" fill="#1a365d">
    <rect x="40" y="70" width="150" height="40" rx="6" fill="#eef2f7" stroke="#2b6cb0" stroke-width="1.5"/>
    <text x="115" y="95" text-anchor="middle">advertiser 1 · v=10</text>
    <rect x="40" y="140" width="150" height="40" rx="6" fill="#eef2f7" stroke="#2b6cb0" stroke-width="1.5"/>
    <text x="115" y="165" text-anchor="middle">advertiser 2 · v=6</text>
    <rect x="40" y="210" width="150" height="40" rx="6" fill="#f5f5f4" stroke="#94a1b2" stroke-width="1.3"/>
    <text x="115" y="235" text-anchor="middle" fill="#64748b">advertiser 3 · v=4</text>
  </g>

  <text x="500" y="40" text-anchor="middle" font-size="13" fill="#64748b">ad slots (click rate)</text>
  <g font-size="13">
    <rect x="430" y="70" width="170" height="40" rx="6" fill="#fdedeb" stroke="#c53030" stroke-width="1.6"/>
    <text x="515" y="95" text-anchor="middle" fill="#c53030">top slot · 100 clicks</text>
    <rect x="430" y="140" width="170" height="40" rx="6" fill="#f3f4ea" stroke="#7c7f46" stroke-width="1.6"/>
    <text x="515" y="165" text-anchor="middle" fill="#5a5d33">second slot · 40 clicks</text>
    <text x="515" y="235" text-anchor="middle" fill="#94a1b2">(no slot · 0 clicks)</text>
  </g>

  <line x1="190" y1="90" x2="430" y2="90" stroke="#c53030" stroke-width="2.5" marker-end="url(#ar)"/>
  <line x1="190" y1="160" x2="430" y2="160" stroke="#7c7f46" stroke-width="2.5" marker-end="url(#ar)"/>
  <line x1="190" y1="230" x2="430" y2="222" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="5 4"/>
  <defs>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#64748b"/>
    </marker>
  </defs>

  <text x="310" y="82" text-anchor="middle" font-size="11.5" fill="#c53030">pays 520 (5.2/click)</text>
  <text x="310" y="152" text-anchor="middle" font-size="11.5" fill="#5a5d33">pays 160 (4/click)</text>

  <text x="350" y="290" text-anchor="middle" font-size="13" fill="#1a365d">VCG payment = externality on others; revenue 520 + 160 = 680</text>
</svg>
