<svg viewBox="0 0 720 430" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Noto Sans SC', sans-serif">
  <line x1="100" y1="40" x2="100" y2="380" stroke="#94a1b2" stroke-width="1.5"/>
  <line x1="100" y1="380" x2="440" y2="380" stroke="#94a1b2" stroke-width="1.5"/>
  <text x="96" y="34" text-anchor="end" font-size="13" fill="#64748b">T(δ)</text>
  <text x="446" y="384" text-anchor="start" font-size="13" fill="#64748b">δ →</text>

  <line x1="100" y1="380" x2="440" y2="40" stroke="#1a365d" stroke-width="2" stroke-dasharray="5 4"/>

  <line x1="100" y1="286.5" x2="440" y2="133.5" stroke="#2b6cb0" stroke-width="2.5"/>

  <polyline fill="none" stroke="#c53030" stroke-width="2"
    points="134,346 134,271.2 208.8,271.2 208.8,237.5 242.5,237.5 242.5,222.4 257.6,222.4 257.6,215.5 264.4,215.5 264.4,212.6 270,212.6"/>

  <line x1="134" y1="380" x2="134" y2="386" stroke="#64748b" stroke-width="1.2"/>
  <text x="134" y="400" text-anchor="middle" font-size="12" fill="#64748b">δ₀</text>

  <line x1="270" y1="210" x2="270" y2="380" stroke="#cfccc4" stroke-width="1.2" stroke-dasharray="4 4"/>
  <circle cx="270" cy="210" r="5" fill="#1a365d"/>
  <text x="270" y="400" text-anchor="middle" font-size="12.5" fill="#1a365d">δ*</text>

  <line x1="472" y1="92" x2="504" y2="92" stroke="#1a365d" stroke-width="2" stroke-dasharray="5 4"/>
  <text x="512" y="96" text-anchor="start" font-size="12.5" fill="#2d3748">45° reference line: δ = T(δ)</text>
  <line x1="472" y1="120" x2="504" y2="120" stroke="#2b6cb0" stroke-width="2.5"/>
  <text x="512" y="124" text-anchor="start" font-size="12.5" fill="#2d3748">contraction map T(δ)</text>
  <line x1="472" y1="148" x2="504" y2="148" stroke="#c53030" stroke-width="2"/>
  <text x="512" y="152" text-anchor="start" font-size="12.5" fill="#2d3748">iteration δ₀ → δ₁ → ⋯ → δ*</text>

  <text x="472" y="196" text-anchor="start" font-size="12" fill="#4a5568">Slope of T is everywhere below 1</text>
  <text x="472" y="215" text-anchor="start" font-size="12" fill="#4a5568">(≈0.45 here), so T is a contraction.</text>
  <text x="472" y="234" text-anchor="start" font-size="12" fill="#4a5568">From any δ₀, iterate δ ← T(δ), the</text>
  <text x="472" y="253" text-anchor="start" font-size="12" fill="#4a5568">staircase converges to the unique</text>
  <text x="472" y="272" text-anchor="start" font-size="12" fill="#4a5568">fixed point δ*. At δ*, predicted</text>
  <text x="472" y="291" text-anchor="start" font-size="12" fill="#4a5568">shares equal observed shares, so</text>
  <text x="472" y="310" text-anchor="start" font-size="12" fill="#4a5568">the inversion is complete.</text>
</svg>
